name: Build Android APK

on:
  push:
    branches:
      - main # <-- Pastikan sesuai nama branch kamu (main/master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      - name: Add Android Platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Give Permission to Gradle
        run: chmod +x android/gradlew # <-- INI KUNCI SAKTI BIAR GAK ERROR 126 LAGI

      - name: Build APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk